appId: com.nestmatch.app
name: Cycle through the four main tabs
tags:
  - navigation
  - smoke
---
- runFlow: ../auth/login-email.yaml

- tapOn:
    id: "tab-search"
- assertVisible:
    id: "screen-search"
    timeout: 5000

- tapOn:
    id: "tab-messages"
- assertVisible:
    id: "screen-messages"
    timeout: 5000

- tapOn:
    id: "tab-profile"
- assertVisible:
    id: "screen-profile"
    timeout: 5000

- tapOn:
    id: "tab-home"
- assertVisible:
    id: "screen-home"
    timeout: 5000

# Verify the redesigned home hero rendered something — any of the three
# variant headlines starts with a fixed lead string.
- assertVisible:
    text: ".*(Pick up|One step from your|New in).*"
    timeout: 5000
